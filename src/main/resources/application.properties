spring.application.name=lottery_system
logging.config=classpath:logback-spring.xml
spring.profiles.active=dev

## MySql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/your_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=123456

## MyBatis
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-handlers-package=org.example.lottery_system.dao.handler

## 短信配置
sms.access-key-id=your_access_key_id
sms.access-key-secret=your_access_key_secret

## Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=60s
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.pool.max-wait=5s

## 文件上传
pic.local-path=./upload/
spring.web.resources.static-locations=classpath:/static/,file:${pic.local-path}

## RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.listener.simple.acknowledge-mode=auto
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=5

## QQ邮箱
spring.mail.host=smtp.qq.com
spring.mail.port=465
spring.mail.username=your_email@qq.com
spring.mail.password=your_email_auth_code
spring.mail.protocol=smtps
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.required=true

## 线程池
async.executor.thread.core_pool_size=10
async.executor.thread.max_pool_size=20
async.executor.thread.queue_capacity=20
async.executor.thread.name.prefix=async-service

## 短信宝
smsbao.username=your_smsbao_username
smsbao.api-key=your_smsbao_api_key
smsbao.signature=your_signature
smsbao.api-url=https://api.smsbao.com/sms
